<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Accès</title>

<style>

body{
    margin:0;
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:
    radial-gradient(circle at top,
    #1a2238 0%,
    #0f0f0f 60%,
    #080808 100%);
    color:#eaeaea;
    font-family:Georgia, serif;
    overflow:hidden;
}

/* ===== ÉTOILES ===== */

.stars{
    position:fixed;
    inset:0;
    pointer-events:none;
    opacity:0.9;
}

.star{
    position:absolute;
    color:white;
    animation:twinkle 4s infinite ease-in-out;
}

.small{ font-size:10px; }
.medium{ font-size:14px; }
.large{ font-size:18px; }

@keyframes twinkle{
    0%{ opacity:0.9; }
    50%{ opacity:0.45; }
    100%{ opacity:0.9; }
}

/* ===== CARTE ===== */

.container{
    width:90%;
    max-width:750px;
    text-align:center;

    background:rgba(255,255,255,0.05);
    backdrop-filter:blur(6px);

    border:1px solid rgba(255,255,255,0.12);
    border-radius:18px;

    padding:40px;

    box-shadow:0 0 30px rgba(0,0,0,0.35);

    z-index:1;
}

.livre{
    font-size:48px;
    margin-bottom:15px;
}

.separateur{
    font-size:22px;
    margin-bottom:30px;
    opacity:0.8;
}

#texte{
    font-size:20px;
    line-height:1.8;
    white-space:pre-line;
}

#curseur{
    animation:clignote 1s infinite;
}

@keyframes clignote{
    50%{ opacity:0; }
}

/* INPUT */

input{
    margin-top:25px;
    padding:12px;
    width:80%;
    max-width:400px;

    border:none;
    border-radius:8px;

    font-size:16px;
    text-align:center;
}

/* BOUTON */

button{
    margin-top:15px;
    padding:12px 25px;

    border:none;
    border-radius:8px;

    cursor:pointer;

    background:#2d374f;
    color:white;

    transition:0.25s;
}

button:hover{
    background:#42506f;
}

/* MESSAGE */

#message{
    margin-top:20px;
    min-height:25px;
    font-style:italic;
}

/* BARRE */

#barContainer{
    width:100%;
    max-width:400px;

    height:10px;

    background:#333;
    border-radius:5px;

    margin:20px auto 0;

    overflow:hidden;

    display:none;
}

#bar{
    height:100%;
    width:0%;
    background:#dcdcdc;
    transition:width 0.1s linear;
}

/* CITATION */

.citation{
    margin-top:35px;
    font-size:14px;
    opacity:0.45;
    font-style:italic;
}

</style>
</head>

<body>

<!-- ===== ÉTOILES ===== -->
<div class="stars">

<div class="star small" style="top:5%;left:8%">✦</div>
<div class="star medium" style="top:8%;left:72%">✦</div>
<div class="star small" style="top:12%;left:42%">✦</div>

<div class="star large" style="top:18%;left:88%">✦</div>
<div class="star medium" style="top:22%;left:18%">✦</div>
<div class="star small" style="top:28%;left:65%">✦</div>

<div class="star medium" style="top:34%;left:8%">✦</div>
<div class="star large" style="top:38%;left:92%">✦</div>
<div class="star small" style="top:42%;left:55%">✦</div>

<div class="star medium" style="top:48%;left:25%">✦</div>
<div class="star small" style="top:52%;left:78%">✦</div>
<div class="star large" style="top:56%;left:12%">✦</div>

<div class="star medium" style="top:62%;left:45%">✦</div>
<div class="star small" style="top:68%;left:88%">✦</div>
<div class="star medium" style="top:72%;left:6%">✦</div>

<div class="star large" style="top:76%;left:58%">✦</div>
<div class="star small" style="top:82%;left:30%">✦</div>
<div class="star medium" style="top:86%;left:80%">✦</div>

<div class="star small" style="top:90%;left:15%">✦</div>
<div class="star medium" style="top:94%;left:60%">✦</div>

</div>

<!-- ===== CONTENU ===== -->

<div class="container">

<div class="livre">📖</div>

<div class="separateur">❦</div>

<div id="texte"></div>
<span id="curseur">|</span>

<br>

<input type="text" id="mdp" placeholder="Votre réponse...">

<br>

<button onclick="verifier()">Déverrouiller</button>

<div id="message"></div>

<div id="barContainer">
<div id="bar"></div>
</div>

<div class="citation">
« Chaque réponse ouvre une nouvelle porte. »
</div>

</div>

<script>

// ===== TEXTE =====

const texte = `Nouvelle question pour ceux qui éventuellement connaissent bien le grand dadais.

Quel est son livre préféré ?

Petit indice :
Si l’auteur et le grand dadais partagent un prénom, l’auteur est loin d’être tout blanc.`;

// ===== ECRITURE =====

let i = 0;

function ecrire(){

    if(i < texte.length){

        let c = texte.charAt(i);

        document.getElementById("texte").innerHTML += c;

        i++;

        let vitesse = 45;

        if(c === ".") vitesse = 600;
        if(c === "\n") vitesse = 800;

        setTimeout(ecrire, vitesse);

    } else {
        document.getElementById("curseur").style.display = "none";
    }
}

ecrire();

// ===== NORMALISATION =====

function normaliser(str){
    return str
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/’/g, "'")
        .replace(/'/g, "")
        .replace(/\s+/g, " ")
        .trim();
}

// ===== VERIFICATION =====

function verifier(){

    let input = normaliser(
        document.getElementById("mdp").value
    );

    let secret = normaliser("L'Âme du monde");

    if(input === secret){

        document.getElementById("barContainer").style.display = "block";

        document.getElementById("message").innerHTML =
        "📚 Consultation des archives...";

        let progress = 0;

        let interval = setInterval(() => {

            progress += 2;

            document.getElementById("bar").style.width =
            progress + "%";

            if(progress === 40){
                document.getElementById("message").innerHTML =
                "🔎 Recherche de correspondance...";
            }

            if(progress === 80){
                document.getElementById("message").innerHTML =
                "✨ Message retrouvé...";
            }

            if(progress >= 100){

                clearInterval(interval);

                document.getElementById("message").innerHTML =
                "✔ Accès autorisé";

                setTimeout(() => {

                    window.location.href =
                    "https://drive.google.com/file/d/1Km4MPV-ugUZQhWOM61iT5lhEcCv753wA/view?usp=sharing";

                }, 1200);
            }

        }, 30);

    } else {

        document.getElementById("message").innerHTML =
        "✖ Réponse incorrecte";
    }
}

</script>

</body>
</html>
